[general]
framerate = 60
bars = 16
sleep_timer = 0
autosens = 1
sensitivity = 120

lower_cutoff_freq = 50
upper_cutoff_freq = 10000

[input]
method = pipewire
source = auto

[output]
method = raw
data_format = ascii
raw_target = /dev/stdout
ascii_max_range = 10
bar_delimiter = 59
frame_delimiter = 10

[smoothing]
monstercat = 0
waves = 0
gravity = 200
integral = 50

[eq]
1 = 1.0
2 = 1.1
3 = 1.3
4 = 1.6
5 = 2.0
